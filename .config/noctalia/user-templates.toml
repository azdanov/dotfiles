[bar.default]
end = [
    "media",
    "tray",
    "notifications",
    "recorder",
    "network",
    "bluetooth",
    "volume",
    "brightness",
    "battery",
    "control-center"
]
margin_edge = 0
margin_ends = 0
radius = 0
start = [ "launcher", "clipboard", "workspaces", "taskbar" ]
widget_spacing = 14

[brightness]
enable_ddcutil = true

[config]

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "power_profile"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "dark_mode"

[desktop_widgets]
schema_version = 2
widget_order = []

    [desktop_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [desktop_widgets.widget]

[dock]
auto_hide = true
enabled = true
icon_size = 36
magnification_scale = 1.2000000029802322
pinned = [ "helium", "nemo", "kitty" ]
reserve_space = false
show_dots = true

[keybinds]
cancel = [ "Escape" ]
down = [ "Ctrl+j" ]
left = [ "Ctrl+h" ]
right = [ "Ctrl+l" ]
up = [ "Ctrl+k" ]
validate = [ "Return" ]

[location]
address = "Tallinn"

[lockscreen]
fingerprint = true

[lockscreen_widgets]
enabled = true
schema_version = 2
widget_order = [
    "lockscreen-login-box@eDP-1",
    "lockscreen-login-box@DP-1",
    "lockscreen-widget-0000000000000001",
    "lockscreen-widget-0000000000000002"
]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@DP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1720.0
    cy = 1321.0
    output = "DP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@DP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget."lockscreen-login-box@eDP-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 768.0
    cy = 841.0
    output = "eDP-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@eDP-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        input_opacity = 1.0
        input_radius = 6.0
        show_login_button = true

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000001]
    box_height = 0.0
    box_width = 0.0
    cx = 786.0
    cy = 528.0
    output = "eDP-1"
    rotation = 0.0
    type = "weather"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000001.settings]
        background = false
        shadow = false

    [lockscreen_widgets.widget.lockscreen-widget-0000000000000002]
    box_height = 0.0
    box_width = 0.0
    cx = 768.0
    cy = 458.5
    output = "eDP-1"
    rotation = 0.0
    type = "clock"

        [lockscreen_widgets.widget.lockscreen-widget-0000000000000002.settings]
        background = false
        shadow = true

[notification]
show_actions = false
show_app_name = false

[plugin_settings."noctalia/screen_recorder"]
video_codec = "av1"

[plugins]
enabled = [ "noctalia/screen_recorder" ]

[shell]
clipboard_image_action_command = "satty -f -"
polkit_agent = true
screen_time_enabled = true
settings_show_advanced = true
telemetry_enabled = true

    [shell.panel]
    launcher_session_search = true

    [shell.screenshot]
    directory = "/home/azdanov/Pictures/Screenshots"

[templates.niri]
input_path = "~/.config/noctalia/templates/niri.kdl"
output_path = "~/.config/niri/noctalia.kdl"

[theme]
community_palette = "Kanagawa Paper"
mode = "dark"
source = "community"

    [theme.templates]
    builtin_ids = []

[wallpaper]
directory = "/home/azdanov/Pictures/Wallpapers"

    [wallpaper.default]
    path = "/home/azdanov/Pictures/Wallpapers/limine-splash.png"

    [wallpaper.last]
    path = "/home/azdanov/Pictures/Wallpapers/limine-splash.png"

[widget.battery]
hide_when_full = true
scale = 1.25
show_label = false

[widget.brightness]
show_label = false

[widget.clock]
format = "{:%H:%M %a, %b %d}"
tooltip_format = ""

[widget.media]
hide_when_no_media = true

[widget.network]
show_label = false

[widget.notifications]
hide_when_no_unread = true

[widget.recorder]
type = "noctalia/screen_recorder:recorder"

[widget.taskbar]
inactive_opacity = 0.80000000000000004
only_active_workspace = true

[widget.volume]
show_label = false
