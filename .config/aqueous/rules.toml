# =============================================================================
# Aqueous WM — window rules
# Path: ~/.config/aqueous/rules.toml
# Reloaded by Super+R together with wm.toml. Missing file = no rules.
# =============================================================================

# Options for the game-mode layout engine. Moved out of wm.toml because they
# only matter when at least one [[window]] rule targets layout = "game-mode".
[game_mode]
remainder_layout = "grid" # tile | grid | monocle | scrolling | float
gaps_inner = 8
fallback_layout = "grid"  # used when no anchor is present on the output

# -----------------------------------------------------------------------------
# Window rules. First match wins; rules are evaluated on manage_start and on
# app_id / title changes. At least one matcher (app_id / class / title) is
# required; rules with none are dropped with a warning.
# -----------------------------------------------------------------------------
[[window]]
app_id = "dota2"
layout = "game-mode"
anchor = "center"    # center | top | bottom | left | right
size = "native"      # "native" | "WxH" | "FxF"
scale = 1.0
tag = 9
fullscreen = false

